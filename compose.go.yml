services:
  frontend:
    build: ./frontend
    container_name: sys_monitor_frontend

    ports:
      - "5173:80"

    depends_on:
      - api

  api:
    build: ./api_go
    container_name: sys_monitor_api_go

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}

    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:15-alpine
    container_name: sys_monitor_db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: