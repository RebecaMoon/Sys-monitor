services:
  frontend:
    build: ./frontend
    container_name: sys_monitor_frontend

    ports:
      - "5173:80"

    depends_on:
      - api

  api:
    build: ./api_python
    container_name: sys_monitor_api

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

    depends_on:
      - database

  database:
    image: postgres:15-alpine
    container_name: sys_monitor_db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: